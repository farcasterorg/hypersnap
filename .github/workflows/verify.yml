name: Verify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    timeout-minutes: 20
    runs-on:
      - runs-on=${{ github.run_id }}
      - runner=64cpu-linux-arm64
    steps:
      - uses: actions/checkout@v4
      - name: Build via Docker Compose
        run: docker compose build

  test:
    timeout-minutes: 20
    runs-on:
      - runs-on=${{ github.run_id }}
      - runner=64cpu-linux-arm64
    steps:
      - name: Install Protoc
        uses: arduino/setup-protoc@v3

      - name: Install Rust 1.89.0
        uses: actions-rs/toolchain@v1
        with:
          toolchain: 1.89.0
          profile: default 
          override: true

      - uses: actions/setup-node@v4
        with:
          node-version: 22 

      - uses: actions/checkout@v4
        with:
          path: ./snapchain

      - working-directory: ./snapchain
        env:
          RUSTFLAGS: "-Dwarnings -A mismatched_lifetime_syntaxes"
        run: cargo test

      - working-directory: ./snapchain
        env:
          RUSTFLAGS: "-Dwarnings -A mismatched_lifetime_syntaxes"
        run: cargo build --bins

      - working-directory: ./snapchain
        env:
          RUSTFLAGS: "-Dwarnings -A mismatched_lifetime_syntaxes"
        run: cargo fmt --all --check

      - working-directory: ./snapchain/tests/client_parity_tests
        run: |
          npx node-gyp@12.2.0 install
          yarn install

      - working-directory: ./snapchain/tests/client_parity_tests
        run: yarn test 
